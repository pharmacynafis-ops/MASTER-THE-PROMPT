<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Writing Tools</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes/green-theme.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/tabs.css">
    <link rel="stylesheet" href="css/components/editor.css">
    <link rel="stylesheet" href="css/components/settings.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <button id="settingsBtn" class="settings-btn" title="Settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>

        <nav class="tabs-nav">
            <button class="tab-btn active" data-tab="prompt-improvement">Prompt Improvement</button>
            <button class="tab-btn" data-tab="grammar-check">English Grammar & Syntax</button>
            <button class="tab-btn" data-tab="translation">Perfect En-Ar Translation</button>
        </nav>

    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Tab Contents -->
        <div id="tab-prompt-improvement" class="tab-content active">
            <div class="editor-container">
                <div class="editor-header">
                    <textarea id="promptInput" class="editor-input" placeholder="Enter your prompt here..."></textarea>
                    <div class="editor-controls">
                        <span class="char-count">0 characters</span>
                        <button class="fullscreen-btn" title="Fullscreen">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <polyline points="9 21 3 21 3 15"></polyline>
                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                <line x1="3" y1="21" x2="10" y2="14"></line>
                            </svg>
                        </button>
                        <button class="clear-btn" title="Clear">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="send-btn">Send</button>
                <div class="output-container">
                    <div class="output-header">
                        <h3>Output</h3>
                        <button class="copy-btn" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="output-content"></div>
                </div>
            </div>
        </div>

        <div id="tab-grammar-check" class="tab-content">
            <div class="editor-container">
                <div class="editor-header">
                    <textarea id="grammarInput" class="editor-input" placeholder="Enter your text here..."></textarea>
                    <div class="editor-controls">
                        <span class="char-count">0 characters</span>
                        <button class="fullscreen-btn" title="Fullscreen">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <polyline points="9 21 3 21 3 15"></polyline>
                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                <line x1="3" y1="21" x2="10" y2="14"></line>
                            </svg>
                        </button>
                        <button class="clear-btn" title="Clear">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="send-btn">Send</button>
                <div class="output-container">
                    <div class="output-header">
                        <h3>Output</h3>
                        <button class="copy-btn" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="output-content"></div>
                </div>
            </div>
        </div>

        <div id="tab-translation" class="tab-content">
            <div class="editor-container">
                <div class="editor-header">
                    <textarea id="translationInput" class="editor-input" placeholder="Enter English text to translate..."></textarea>
                    <div class="editor-controls">
                        <span class="char-count">0 characters</span>
                        <button class="fullscreen-btn" title="Fullscreen">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <polyline points="9 21 3 21 3 15"></polyline>
                                <line x1="21" y1="3" x2="14" y2="10"></line>
                                <line x1="3" y1="21" x2="10" y2="14"></line>
                            </svg>
                        </button>
                        <button class="clear-btn" title="Clear">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="send-btn">Send</button>
                <div class="output-container">
                    <div class="output-header">
                        <h3>Output</h3>
                        <button class="copy-btn" title="Copy to clipboard">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="output-content"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="apiKey">OpenRouter API Key:</label>
                    <input type="password" id="apiKey" placeholder="Enter your API key">
                    <a href="https://openrouter.ai/workspaces/default/keys" target="_blank" rel="noopener noreferrer" class="api-key-link">
                        Get your OpenRouter API key
                    </a>
                </div>
                <div class="form-group">
                    <label for="modelSelect">Select Model:</label>
                    <select id="modelSelect">
                        <option value="deepseek/deepseek-chat">DeepSeek V3.2 Flash</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn">Save</button>
            </div>
        </div>
    </div>


    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="js/config/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/dom.js"></script>
    <script src="js/services/storage.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/prompts/prompt-improvement.js"></script>
    <script src="js/prompts/grammar-check.js"></script>
    <script src="js/prompts/translation.js"></script>
    <script src="js/components/editor.js"></script>
    <script src="js/components/tabs.js"></script>
    <script src="js/components/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
